<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte de Asistencias - ITSON</title>
  <link rel="stylesheet" href="../styles/asistencias.css">
</head>

<body>
  <header class="topbar">
    <img src="../assets/logo_itson.png" alt="ITSON" class="logo-itson">
    <h1 class="topbar-title">Reporte de Asistencias</h1>
  </header>

  <div class="container">
    <h2 id="tituloReporte" class="titulo-pagina">Reporte de Asistencias</h2>

    <!-- Filtros -->
    <div class="filtros-container">
      <input type="text" id="filtroMatricula" placeholder="Filtrar por matrícula">

      <select id="filtroMateria"></select>

      <label for="filtroFechaInicio">Desde:</label>
      <input type="date" id="filtroFechaInicio">

      <label for="filtroFechaFin">Hasta:</label>
      <input type="date" id="filtroFechaFin">

      <select id="filtroEstado">
        <option value="">Todos</option>
        <option value="Presente">Presente</option>
        <option value="Tarde">Tarde</option>
        <option value="Falta">Falta</option>
        <option value="Ausente">Ausente</option>
      </select>

      <button class="btn-primary" onclick="aplicarFiltros()">Buscar</button>
    </div>

    <!-- Tabla de asistencias -->
    <div id="reporteImprimible">
      <table id="tablaAsistencias">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Matrícula</th>
            <th>Nombre</th>
            <th>Materia</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Métricas -->
    <div class="metricas-panel">
      <div class="card">
        <h3>Total registros</h3>
        <p id="totalReg">0</p>
      </div>
      <div class="card present">
        <h3>Presentes</h3>
        <p id="totalPresente">0</p>
      </div>
      <div class="card late">
        <h3>Tarde</h3>
        <p id="totalTarde">0</p>
      </div>
      <div class="card falta">
        <h3>Faltas</h3>
        <p id="totalFalta">0</p>
      </div>
    </div>

    <!-- Botones -->
    <div class="botones">
      <button class="btn-pdf" onclick="descargarPDF()">Descargar PDF</button>
      <button class="btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.14/jspdf.plugin.autotable.min.js"></script>

  <script src="../../mocks/gruposMock.js"></script>
  <script src="../scripts/asistencias.js"></script>
</body>

</html>
